# Development mode - только базы данных
# Сервисы запускаются локально в IDE

services:
  postgres-user:
    image: postgres:17-alpine
    container_name: rentflow-postgres-user
    environment:
      POSTGRES_DB: rentflow_user
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-user-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rentflow_user"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-tool:
    image: postgres:17-alpine
    container_name: rentflow-postgres-tool
    environment:
      POSTGRES_DB: rentflow_tool
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres-tool-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rentflow_tool"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-user-data:
  postgres-tool-data:
